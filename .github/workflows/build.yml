name: Build

on:
  push:
    branches: [main, dev]
    tags:
      - 'v*'
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            goos: windows
            goarch: amd64
            ext: .exe
          - os: linux
            arch: arm64
            goos: linux
            goarch: arm64
            ext: ''
          - os: linux
            arch: amd64
            goos: linux
            goarch: amd64
            ext: ''
          - os: darwin
            arch: arm64
            goos: darwin
            goarch: arm64
            ext: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.*'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output_name="imgrab-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "$output_name" .
          echo "Built: $output_name"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            imgrab**
          token: ${{ secrets.GITHUB_TOKEN }}
